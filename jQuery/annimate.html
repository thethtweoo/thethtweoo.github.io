<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANNIMATE</title>
    <script src="jquery-4.0.0.min.js"></script>

    <style>
        #panel {
            max-width: 150px;
            padding: 50px 0;
            background-color: yellow;
            color: black;
            text-align: center;
            position: relative;
        }
    </style>
</head>
<body>
    <p id="panel">Animation</p>
    <button id="start">Start</button>
    <button id="stop">Stop</button>


    <script>
        $(document).ready(function(){
            $('#start').click(function(){
                $('#panel').animate({left: '350px'},4000);
                $('#panel').animate({top: '350px'},4000);
                $('#panel').animate({left: '0'},4000);
                $('#panel').animate({top: '0'},4000);

                
            });

            $('#stop').click(function(){
                $('#panel').stop(true).css({left: '0', top: '0'},5000);
            });
        });
    </script>
</body>
</html>
