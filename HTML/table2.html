<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table 2 Exercise</title>
</head>
<body>
    

    <h1>Invoice</h1>

    <table border="1" cellspacing="0" cellpadding="20" align="center">
        <thead>
            <tr>
                <th>No</th>
                <th>Item Name</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Amount</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Shark</td>
                <td>2400</td>
                <td>2</td>
                <td>4800</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Royal-D</td>
                <td>1000</td>
                <td>5</td>
                <td>5000</td>
            </tr>


            <tr>
                <td>3</td>
                <td>SP Cake</td>
                <td>1500</td>
                <td>2</td>
                <td>3000</td>
            </tr>


            <tr>
                <td>4</td>
                <td>Tissue</td>
                <td>2000</td>
                <td>2</td>
                <td>4000</td>
            </tr>


            <tr>
                <td>5</td>
                <td>Noodle</td>
                <td>3000</td>
                <td>2</td>
                <td>6000</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th colspan="4">Total</th>
                <th>22800</th>
            </tr>
        </tfoot>
    </table>


    <h1>Saving Money</h1>
    <table border="1" cellspacing="0" cellpadding="20" align="center">
        <thead>
            <tr>
                <th>Months</th>
                <th>Save Money</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                 <td>January</td>
                 <td>100000</td>
                 <td rowspan="5">900000</td>
            </tr>

            <tr>
                <td>February</td>
                <td>200000</td>
           </tr>

           <tr>
            <td>March</td>
            <td>200000</td>
            </tr>

            <tr>
                <td>April</td>
                <td>200000</td>
           </tr>

           <tr>
            <td>May</td>
            <td>200000</td>
           </tr>


        </tbody>
    </table>
</body>
</html>
