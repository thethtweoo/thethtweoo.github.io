<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPRASION</title>
</head>
<body>
    

    <h1>Comprasion </h1>

    <script>
        // Greater Than Operator  >
        let num1 = '10';
        let num2 = 10;
        console.log(num1 > num2); //treue false


        // greather than or equal to operator >= 
        console.log(num1 >= num2);


        // less than operator < 
        console.log(num1 < num2);


        // less than or equal to operator <=
        console.log(num1 <= num2);


        // equal to operator == value
        console.log(num1 == num2);



        // equal to operator === data type and value 
        console.log(num1 === num2);


        // not equal to operator != value 
        console.log(num1 != num2);


        // not equal to operator !== data type and value 
        console.log(num1 !== num2);



    </script>
</body>
</html>
