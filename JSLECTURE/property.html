<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROPERTY</title>
</head>
<body>
    

    <h1>Property</h1>

    <h2 id="setTextNode"></h2>

    <p id="setAttr">This is Attribute</p>
    <p id="getAttr" style="color: green; font-size: 30px;">This is get Attribute</p>
    <p id="removeAttr" style="color: red;">This is remove Attribute</p>


    <button onclick="setTextNode()">Set Text Node</button>
    <button onclick="createElementLesson()">Create Element</button>
    <button onclick="setAttr()">Set Attribute</button>
    <button onclick="getAttr()">Get Attribute</button>
    <button onclick="removeAttr()">Remove Attribute</button>




    <script>
        // set text node 
        function setTextNode(){
            let h2 = document.getElementById('setTextNode');
            let textNode = document.createTextNode('Hello World');
            h2.appendChild(textNode);
        }



        // create element 
        function createElementLesson(){
            let h3 = document.createElement('h3');
            h3.innerText = "Create Element";
            document.body.appendChild(h3);
        }



        // set attribute 
        function setAttr(){
            let p = document.getElementById('setAttr');
            p.setAttribute('style', 'color:red;border:1px solid black;');
        }


        // get attribute 
        function getAttr(){
            let p = document.getElementById('getAttr');
            let myAttr = p.getAttribute('style');

            console.log(myAttr);
        }


        // remove attribute 
        function removeAttr(){
            let p = document.getElementById('removeAttr');
            let myAttr = p.getAttribute('style');

            if(myAttr == 'color:red'){
                p.removeAttribute('style');
                p.setAttribute('style', 'color:green');
            }else{
                p.removeAttribute('style');
                p.setAttribute('style', 'color:red');
            }
        }
    </script>
</body>
</html>
