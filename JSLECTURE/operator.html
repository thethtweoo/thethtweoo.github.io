<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator</title>
</head>
<body>
    

    <H1>Operator</H1>

    <script>
        // Assign Operator 
        let name = "Thet Htwe Oo";
        console.log(name);


        // Addition Operator +++
        let number = 4 + 5;
        console.log(number);
        let fourFive = '4' + 5;
        console.log(fourFive);

        let number1 = 20000;
        let number2 = 30000;
        let number3 = number1 + number2;
        console.log(number3);

        let num = 10;
        // num = num + 1;
        num += 5;
        console.log(num);

        let numOne = 10;
        // numOne++;
        console.log(++numOne);
        console.log(numOne);



        // Multiplication Operator  ****
        let num4 = 500;
        // num4 *= 3;
        num4 = num4 * 3;
        console.log(num4);




        // Division Operator  ////
        let num5 = 10;
        num5 = num5 / 2;
        console.log(num5);




        // Remainder Operator  % % %
        let num6 = 12938;
        num6 = num6 % 567;
        console.log(num6);



        // Exponent Operator ** ** **
        const num7 = 2;
        const num8 = 6;
        const num9 = num7 ** num8;
        console.log(num9);





        // Presendence Operator  * / + -
        let result = (4 + 5) - 2 * 5 / 2 % 3;
        console.log(result);

    </script>
</body>
</html>
