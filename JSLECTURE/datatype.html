<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATATYPE</title>
</head>
<body>
    

    <h1>Data Type</h1>

    <script>
        // String DateType
        // let name = "Thet Htwe Oo";
        // let name = 'Thet Htwe Oo';
        let name = `Thet Htwe Oo`;
        console.log(name);
        console.log(typeof(name));


        // Numberic DateType
        let age = 29;
        console.log(age);
        console.log(typeof(age));

        // Bollen DateType (True or False)
        let isStudent = true;
        console.log(isStudent);
        console.log(typeof(isStudent));


        // Undefined DataType
        let undefinedVariable;
        console.log(undefinedVariable);
        console.log(typeof(undefinedVariable));


        // Null DataType
        let nullVariable = null;
        console.log(nullVariable);
        console.log(typeof(nullVariable));


        // Array Data Type (index start from 0) 
        // let studentList = new Array('Thet Thet', 'Mg Mg', 'Hla Hla');
        let studentList = ['Thet Thet', 'Mg Mg', 'Hla Hla'];

        console.log(studentList);
        console.log(typeof(studentList));
        console.log(studentList.length);
        console.log(studentList[2]);


        // Object Data Type 
        let student = {
            // key : value 
            name : "Thet Htwe Oo",
            age : 22,
            address : "Taunggyi",
            education : "YUFL",
        }


        console.log(student);
        console.log(typeof(student));
        console.log(student.education);

        
    </script>
</body>
</html>
