<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logical Operator</title>
</head>
<body>
    
    <h1>Logical Lessons</h1>

    <script>
        // OR operator  ||
        let num1 = 10;
        let num2 = 20;

        console.log(num1 < num2 || num1 == num2 ); //true || false => true


        // AND operator &&
        console.log(num1 < num2 && num1 == num2); //true && false => false


        // NOT operator !
        let num3 = 10;
        console.log(!num3); //false
    </script>
</body>
</html>
