<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condition</title>
</head>
<body>
    
    <h1>Condition</h1>

    <script>
        // if statement 

        // if(condition == true){
        //     code
        // }


        let num = prompt("Enter a number");

        // console.log(num);
        if(num < 10){
            document.write("This number is less than 10");
        }else if(num == 10){
            document.write("This number is equal to 10");
        }else if(num > 10){
            document.write("This number is greater than 10");
        }
    </script>
</body>
</html>
