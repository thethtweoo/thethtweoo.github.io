<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    
    <h1>Array</h1>

    <script>

        // array 

        let studentList = ['Thet Htwe Oo', 'Aung Aung', 'Hla Hla'];
        console.log(studentList);
        console.log(studentList.length);
        console.log(studentList[0]);


        // array.push()
        studentList.push('Tun Tun');
        console.log(studentList);


        // array.pop()
        studentList.pop();
        console.log(studentList);


        // array.unshift()
        studentList.unshift('Mg Mg');
        console.log(studentList);


        // array.shift()
        studentList.shift();
        console.log(studentList);


        // array.sort()
        studentList.sort();
        console.log(studentList);


        let studentList2 = ['Aung AUng', 'Mg Mg', 'Tun Zaw', 'Aung Maw', 'Aung Yaw'];


        // array.reverse()
        studentList2.reverse();
        console.log(studentList2);


        studentList2.sort() .reverse();
        console.log(studentList2);


        // array.toString()
        
        console.log(studentList2.toString());


        // String to Array 
        let studentList3 = 'Kyaw Kyaw, Mg Mg, Aung Aung, Zaw Zaw';
        studentListArray = studentList3.split(',');
        console.log(studentListArray);



        let array1 = [1,2,3,4];
        let array2 = [5,6,7,8];
        let array3 = [9,10,11,12];

        let result = array1.concat(array2,array3);
        console.log(result);


        let result2 = [...array1, ...array2, ...array3];
        console.log(result2);




    </script>
</body>
</html>
