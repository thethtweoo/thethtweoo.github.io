<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variablr</title>
</head>
<body>
    
    <h1>Variable</h1>

    <script>
        // global variable 
        var name = "Thet Htwe Oo";
        var name = "Thet Htwe Oo Updated";
        name = "Thet Htwe Oo Again";
        console.log(name);


        // block scope variable
        let fatherName = "U Kyaw";
        fatherName = "U Kyaw Again";
        console.log(fatherName);

        var num = 20;
        if(num){
            let num1 = 20;
            let result = num + num1;
            console.log(result);
        }


        // Const Variable
        const motherName = "Daw Mya";
        console.log(motherName);
    </script>
</body>
</html>
