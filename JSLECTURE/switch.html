        let age = 19;

        switch(age){
            case 18:
                document.write('Your age is 18 years old');
                break;
            case 19: 
                document.write('Your age is 19 years old');
                break;
            default:
                document.write('Your are not 18 or 20 years old');
                break;    

        }
