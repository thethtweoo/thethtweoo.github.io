<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Lessons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Inline Layout</h1>

    <a href="https://www.google.com" target="_blank" title="This is google" class="inlineLayout">Google</a>
    <a href="https://www.facebook.com" target="_blank" title="This is facebook" class="inlineLayout">Facebook</a>
    <a href="https://www.tiktok.com" target="_blank" title="This is tiktok" class="inlineLayout">TikTok</a>



    <h1>Block Layout</h1>


    <p class="block">Hello</p>
    <p class="block">I Love CSS</p>
</body>
</html>
